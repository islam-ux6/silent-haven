<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - SilentHaven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container" style="max-width: 400px;">
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">🌿 SilentHaven</h3>
                <h5 class="text-center mb-4">С возвращением</h5>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-success w-100 mt-3">Войти</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'register' %}">Нет аккаунта? Создать</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
