<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя статистика - SilentHaven</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Дашборд состояния</h2>
        <a href="/" class="btn btn-outline-primary">Вернуться в чат</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="card-title text-muted">Динамика настроения (на основе анализа текста)</h5>
            <canvas id="sentimentChart" height="100"></canvas>
        </div>
    </div>
</div>

<script>
    // Получаем данные из Django (переданные из views.py)
    const labels = {{ timestamps|safe }};
    const dataPoints = {{ sentiments|safe }};

    // Настраиваем и рисуем график
    const ctx = document.getElementById('sentimentChart').getContext('2d');
    const sentimentChart = new Chart(ctx, {
        type: 'line', // Тип графика - линия
        data: {
            labels: labels, // Время сообщений по оси X
            datasets: [{
                label: 'Индекс настроения (-1 негатив, 1 позитив)',
                data: dataPoints, // Оценки по оси Y
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.2)',
                borderWidth: 2,
                fill: true,
                tension: 0.4 // Делает линию плавной
            }]
        },
        options: {
            scales: {
                y: {
                    min: -1,
                    max: 1
                }
            }
        }
    });
</script>

</body>
</html>
